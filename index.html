<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未来对象匹配</title>
    <style>
        :root {
            --pink: #ff6b9d;
            --pink-light: #ff9ec4;
            --purple: #c77dff;
            --purple-dark: #7b2ff7;
            --gold: #ffd166;
            --bg-start: #1a0a2e;
            --bg-mid: #1e1040;
            --bg-end: #0d0618;
            --card-bg: rgba(30, 16, 64, 0.85);
            --text: #f0e6ff;
            --text-secondary: #c9b8e8;
            --input-bg: rgba(255, 255, 255, 0.07);
            --input-border: rgba(255, 255, 255, 0.2);
            --input-focus: rgba(199, 125, 255, 0.6);
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            --glow: 0 0 30px rgba(199, 125, 255, 0.4);
            --glow-gold: 0 0 40px rgba(255, 209, 102, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0d0618 0%, #1a0a2e 25%, #1e1040 50%, #150830 75%, #0d0618 100%);
            background-size: 400% 400%;
            animation: bgShift 20s ease infinite;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes bgShift {
            0%,
            100% {
                background-position: 0% 50%;
            }
            25% {
                background-position: 100% 0%;
            }
            50% {
                background-position: 100% 100%;
            }
            75% {
                background-position: 0% 100%;
            }
        }

        /* 星空粒子 */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }
        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.2;
                transform: scale(1);
            }
            50% {
                opacity: 0.9;
                transform: scale(1.8);
            }
        }

        /* 浮动心形 */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .float-heart {
            position: absolute;
            font-size: var(--size);
            animation: floatUp var(--dur) ease-in forwards;
            animation-delay: var(--delay);
            opacity: 0;
            color: var(--color);
        }
        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(0) translateX(0) rotate(0deg) scale(0.3);
            }
            15% {
                opacity: 0.8;
                transform: translateY(-30px) translateX(15px) rotate(10deg) scale(1);
            }
            50% {
                opacity: 0.6;
                transform: translateY(-180px) translateX(-25px) rotate(-5deg) scale(0.9);
            }
            85% {
                opacity: 0.2;
                transform: translateY(-350px) translateX(20px) rotate(8deg) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translateY(-500px) translateX(-10px) rotate(0deg) scale(0.1);
            }
        }

        /* 主容器 */
        .main-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            padding: 20px;
        }

        /* 卡片 */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 40px 32px 36px;
            box-shadow: var(--shadow), var(--glow);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            text-align: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(199, 125, 255, 0.08), transparent, rgba(255, 107, 157, 0.08), transparent);
            animation: cardShine 12s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes cardShine {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        .card>* {
            position: relative;
            z-index: 1;
        }

        /* 标题 */
        .title-area {
            margin-bottom: 10px;
        }
        .title-icon {
            font-size: 48px;
            display: block;
            animation: heartbeat 1.2s ease-in-out infinite;
            margin-bottom: 4px;
        }
        @keyframes heartbeat {
            0%,
            100% {
                transform: scale(1);
            }
            15% {
                transform: scale(1.25);
            }
            30% {
                transform: scale(1);
            }
            45% {
                transform: scale(1.2);
            }
            60% {
                transform: scale(1);
            }
        }
        .card h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff9ec4, #c77dff, #ffd166);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1.3;
        }
        .card .subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
            letter-spacing: 1px;
        }

        /* 装饰线 */
        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #ff6b9d, #c77dff);
            border-radius: 10px;
            margin: 18px auto 22px;
            opacity: 0.7;
        }

        /* 输入组 */
        .input-group {
            margin-bottom: 18px;
            text-align: left;
            position: relative;
        }
        .input-group label {
            display: block;
            font-size: 0.9rem;
            color: #d4c5f0;
            margin-bottom: 8px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: color 0.3s;
        }
        .input-group label .label-icon {
            margin-right: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 16px;
            border: 2px solid var(--input-border);
            background: var(--input-bg);
            color: #fff;
            font-size: 1rem;
            letter-spacing: 1px;
            outline: none;
            transition: all 0.35s ease;
            font-family: inherit;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.5px;
        }
        .input-group input:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 20px rgba(199, 125, 255, 0.25), 0 0 0 4px rgba(199, 125, 255, 0.06);
            background: rgba(255, 255, 255, 0.1);
        }
        .input-group input.error {
            border-color: #ff4757;
            animation: shake 0.5s ease;
            box-shadow: 0 0 16px rgba(255, 71, 87, 0.3);
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-8px);
            }
            40% {
                transform: translateX(8px);
            }
            60% {
                transform: translateX(-5px);
            }
            80% {
                transform: translateX(5px);
            }
        }
        .error-msg {
            color: #ff4757;
            font-size: 0.78rem;
            margin-top: 5px;
            display: none;
            letter-spacing: 0.5px;
        }
        .error-msg.show {
            display: block;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 按钮 */
        .btn-submit {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            color: #fff;
            background: linear-gradient(135deg, #c77dff, #ff6b9d);
            box-shadow: 0 8px 30px rgba(199, 125, 255, 0.4);
            transition: all 0.35s ease;
            position: relative;
            overflow: hidden;
            margin-top: 8px;
            font-family: inherit;
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 40px rgba(199, 125, 255, 0.55);
        }
        .btn-submit:active {
            transform: scale(0.96);
            transition: transform 0.15s ease;
        }
        .btn-submit:disabled {
            cursor: not-allowed;
            opacity: 0.55;
            transform: none;
            box-shadow: 0 4px 15px rgba(199, 125, 255, 0.2);
        }
        .btn-submit .btn-shimmer {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            animation: shimmer 2.5s infinite;
        }
        @keyframes shimmer {
            0% {
                left: -100%;
            }
            100% {
                left: 100%;
            }
        }

        /* 进度区域 */
        .progress-area {
            display: none;
            margin-top: 20px;
            animation: fadeInUp 0.5s ease;
        }
        .progress-area.active {
            display: block;
        }
        .progress-steps {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }
        .progress-step {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            opacity: 0;
            transform: translateX(-15px);
            transition: all 0.4s ease;
            letter-spacing: 0.5px;
        }
        .progress-step.visible {
            opacity: 1;
            transform: translateX(0);
        }
        .progress-step .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #c77dff;
            flex-shrink: 0;
            animation: pulse-dot 0.8s ease-in-out infinite;
        }
        .progress-step.done .step-dot {
            background: #4ecb71;
            animation: none;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                box-shadow: 0 0 6px #c77dff;
            }
            50% {
                box-shadow: 0 0 18px #c77dff, 0 0 30px #c77dff;
            }
        }
        .progress-bar-wrap {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            height: 12px;
            overflow: hidden;
            position: relative;
        }
        .progress-bar-fill {
            height: 100%;
            border-radius: 30px;
            background: linear-gradient(90deg, #ff6b9d, #c77dff, #ffd166);
            background-size: 200% 100%;
            animation: barGlow 1.5s linear infinite;
            width: 0%;
            transition: width 0.15s ease-out;
            position: relative;
        }
        @keyframes barGlow {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }
        .progress-percent {
            text-align: right;
            font-size: 0.9rem;
            color: #ffd166;
            font-weight: 700;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        /* 结果区域 */
        .result-area {
            display: none;
            margin-top: 22px;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .result-area.active {
            display: block;
        }
        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.7);
            }
            70% {
                transform: scale(1.05);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        .result-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.35);
            border: 4px solid rgba(255, 255, 255, 0.2);
            position: relative;
            transition: all 0.6s ease;
        }
        .result-circle.perfect {
            border-color: #ffd166;
            box-shadow: var(--glow-gold), 0 0 80px rgba(255, 209, 102, 0.4);
            animation: glowPulse 1s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%,
            100% {
                box-shadow: 0 0 40px rgba(255, 209, 102, 0.7), 0 0 80px rgba(255, 209, 102, 0.4);
            }
            50% {
                box-shadow: 0 0 60px rgba(255, 209, 102, 1), 0 0 120px rgba(255, 209, 102, 0.7);
            }
        }
        .result-big-num {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 0px;
            background: linear-gradient(135deg, #ffd166, #ff9ec4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .result-perfect-text {
            font-size: 0.8rem;
            color: #ffd166;
            letter-spacing: 1px;
            margin-top: -2px;
        }
        .result-details {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 14px;
        }
        .result-tag {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 0.8rem;
            color: #d4c5f0;
            letter-spacing: 0.5px;
            transition: all 0.4s ease;
        }
        .result-tag.perfect-tag {
            border-color: rgba(255, 209, 102, 0.5);
            color: #ffd166;
            background: rgba(255, 209, 102, 0.08);
        }
        .result-message {
            margin-top: 16px;
            font-size: 1rem;
            color: #f0e6ff;
            letter-spacing: 1px;
            font-weight: 500;
            line-height: 1.6;
        }
        .result-message.perfect-msg {
            font-size: 1.15rem;
            color: #ffd166;
            font-weight: 700;
            animation: glowText 2s ease-in-out infinite;
        }
        @keyframes glowText {
            0%,
            100% {
                text-shadow: 0 0 10px rgba(255, 209, 102, 0.5);
            }
            50% {
                text-shadow: 0 0 30px rgba(255, 209, 102, 1), 0 0 60px rgba(255, 209, 102, 0.6);
            }
        }

        /* 重新匹配按钮 */
        .btn-reset {
            display: none;
            margin-top: 16px;
            padding: 10px 28px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            border-radius: 30px;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            background: transparent;
            color: #d4c5f0;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .btn-reset.active {
            display: inline-block;
        }
        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.5);
            color: #fff;
        }

        /* 粒子爆发 */
        .particle-burst {
            position: fixed;
            pointer-events: none;
            z-index: 999;
        }
        .burst-particle {
            position: absolute;
            width: var(--psize);
            height: var(--psize);
            border-radius: 50%;
            background: var(--pcolor);
            animation: burst var(--pdur) ease-out forwards;
            animation-delay: var(--pdelay);
            opacity: 0;
        }
        @keyframes burst {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--px), var(--py)) scale(0);
            }
        }

        /* 响应式 */
        @media (max-width: 560px) {
            .card {
                padding: 28px 18px 26px;
                border-radius: 22px;
            }
            .card h1 {
                font-size: 1.5rem;
            }
            .title-icon {
                font-size: 36px;
            }
            .input-group input {
                padding: 12px 14px;
                font-size: 0.9rem;
                border-radius: 12px;
            }
            .btn-submit {
                padding: 14px;
                font-size: 1rem;
            }
            .result-circle {
                width: 105px;
                height: 105px;
            }
            .result-big-num {
                font-size: 2.4rem;
            }
            .result-details {
                gap: 6px;
            }
            .result-tag {
                padding: 6px 11px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

    <!-- 星空背景 -->
    <div class="stars-container" id="starsContainer"></div>

    <!-- 浮动心形 -->
    <div class="floating-hearts" id="floatingHearts"></div>

    <!-- 主容器 -->
    <div class="main-wrapper">
        <div class="card" id="mainCard">
            <!-- 标题 -->
            <div class="title-area">
                <span class="title-icon">💝</span>
                <h1>未来对象匹配</h1>
                <p class="subtitle">✨ 探索你们的缘分密码 ✨</p>
            </div>
            <div class="divider"></div>

            <!-- 输入框 -->
            <div class="input-group">
                <label for="nameSelf">
                    <span class="label-icon">👤</span> 你的名字
                </label>
                <input
                type="text"
                id="nameSelf"
                placeholder="请输入你的名字..."
                autocomplete="off"
                maxlength="30"
                >
                <span class="error-msg" id="errorSelf">请输入你的名字</span>
            </div>
            <div class="input-group">
                <label for="nameCrush">
                    <span class="label-icon">💖</span> 你喜欢的人的名字
                </label>
                <input
                type="text"
                id="nameCrush"
                placeholder="请输入你喜欢的人的名字..."
                autocomplete="off"
                maxlength="30"
                >
                <span class="error-msg" id="errorCrush">请输入你喜欢的人的名字</span>
            </div>

            <!-- 提交按钮 -->
            <button class="btn-submit" id="btnSubmit" onclick="startMatching()">
                <span class="btn-shimmer"></span>
                🔮 开始匹配
            </button>

            <!-- 进度区域 -->
            <div class="progress-area" id="progressArea">
                <div class="progress-steps" id="progressSteps">
                    <div class="progress-step" id="step1"><span class="step-dot"></span>正在分析姓名能量场...</div>
                    <div class="progress-step" id="step2"><span class="step-dot"></span>正在计算缘分指数...</div>
                    <div class="progress-step" id="step3"><span class="step-dot"></span>正在匹配灵魂共鸣度...</div>
                    <div class="progress-step" id="step4"><span class="step-dot"></span>正在测算未来契合率...</div>
                    <div class="progress-step" id="step5"><span class="step-dot"></span>综合评估中...</div>
                </div>
                <div class="progress-bar-wrap">
                    <div class="progress-bar-fill" id="progressBarFill"></div>
                </div>
                <p class="progress-percent" id="progressPercent">0%</p>
            </div>

            <!-- 结果区域 -->
            <div class="result-area" id="resultArea">
                <div class="result-circle" id="resultCircle">
                    <span class="result-big-num" id="resultBigNum">0%</span>
                    <span class="result-perfect-text" id="resultPerfectText" style="display:none;">💯 天作之合</span>
                </div>
                <div class="result-details" id="resultDetails"></div>
                <p class="result-message" id="resultMessage"></p>
                <button class="btn-reset" id="btnReset" onclick="resetAll()">🔄 重新匹配</button>
            </div>
        </div>
    </div>

    <!-- 粒子爆发容器 -->
    <div class="particle-burst" id="particleBurst"></div>

    <script>
        (function() {
            // ============ 初始化星空背景 ============
            const starsContainer = document.getElementById('starsContainer');
            const starCount = 100;
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const size = Math.random() * 2.5 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--dur', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--delay', Math.random() * 5 + 's');
                starsContainer.appendChild(star);
            }

            // ============ 初始化浮动心形 ============
            const floatingHearts = document.getElementById('floatingHearts');
            const heartEmojis = ['💕', '💖', '💗', '💓', '🩷', '💝', '✨', '💫', '🌟', '🫧'];
            function spawnHeart() {
                const heart = document.createElement('span');
                heart.classList.add('float-heart');
                heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
                heart.style.left = Math.random() * 90 + '%';
                heart.style.bottom = '0px';
                heart.style.setProperty('--size', (Math.random() * 1.5 + 0.8) + 'rem');
                heart.style.setProperty('--dur', (Math.random() * 5 + 5) + 's');
                heart.style.setProperty('--delay', '0s');
                heart.style.setProperty('--color',
                    ['#ff9ec4', '#c77dff', '#ffd166', '#ff6b9d', '#fff'][Math.floor(Math.random() * 5)]
                );
                floatingHearts.appendChild(heart);
                setTimeout(() => {
                    if (heart.parentNode) heart.parentNode.removeChild(heart);
                }, 10000);
            }
            setInterval(spawnHeart, 1800);
            // 初始生成几个
            for (let i = 0; i < 6; i++) {
                setTimeout(spawnHeart, i * 400);
            }

            // ============ 粒子爆发效果 ============
            function burstParticles(x, y, count, colors) {
                const container = document.getElementById('particleBurst');
                container.style.left = x + 'px';
                container.style.top = y + 'px';
                const fragment = document.createDocumentFragment();
                for (let i = 0; i < count; i++) {
                    const p = document.createElement('div');
                    p.classList.add('burst-particle');
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.random() * 120 + 40;
                    p.style.setProperty('--px', Math.cos(angle) * dist + 'px');
                    p.style.setProperty('--py', Math.sin(angle) * dist + 'px');
                    p.style.setProperty('--psize', (Math.random() * 6 + 3) + 'px');
                    p.style.setProperty('--pcolor', colors[Math.floor(Math.random() * colors.length)]);
                    p.style.setProperty('--pdur', (Math.random() * 0.8 + 0.6) + 's');
                    p.style.setProperty('--pdelay', Math.random() * 0.2 + 's');
                    fragment.appendChild(p);
                }
                container.appendChild(fragment);
                setTimeout(() => {
                    container.innerHTML = '';
                }, 1500);
            }

            // ============ DOM引用 ============
            const nameSelfInput = document.getElementById('nameSelf');
            const nameCrushInput = document.getElementById('nameCrush');
            const errorSelf = document.getElementById('errorSelf');
            const errorCrush = document.getElementById('errorCrush');
            const btnSubmit = document.getElementById('btnSubmit');
            const progressArea = document.getElementById('progressArea');
            const progressBarFill = document.getElementById('progressBarFill');
            const progressPercent = document.getElementById('progressPercent');
            const progressSteps = document.getElementById('progressSteps');
            const stepEls = document.querySelectorAll('.progress-step');
            const resultArea = document.getElementById('resultArea');
            const resultCircle = document.getElementById('resultCircle');
            const resultBigNum = document.getElementById('resultBigNum');
            const resultPerfectText = document.getElementById('resultPerfectText');
            const resultDetails = document.getElementById('resultDetails');
            const resultMessage = document.getElementById('resultMessage');
            const btnReset = document.getElementById('btnReset');
            const mainCard = document.getElementById('mainCard');

            let isMatching = false;
            let matchTimer = null;
            let progressInterval = null;

            // ============ 清除输入框错误状态 ============
            nameSelfInput.addEventListener('input', () => {
                nameSelfInput.classList.remove('error');
                errorSelf.classList.remove('show');
            });
            nameCrushInput.addEventListener('input', () => {
                nameCrushInput.classList.remove('error');
                errorCrush.classList.remove('show');
            });

            // ============ 回车键提交 ============
            nameSelfInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') nameCrushInput.focus();
            });
            nameCrushInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !isMatching) startMatching();
            });

            // ============ 验证输入 ============
            function validateInputs() {
                let isValid = true;
                const selfVal = nameSelfInput.value.trim();
                const crushVal = nameCrushInput.value.trim();

                if (!selfVal) {
                    nameSelfInput.classList.add('error');
                    errorSelf.classList.add('show');
                    errorSelf.textContent = '请输入你的名字';
                    isValid = false;
                } else {
                    nameSelfInput.classList.remove('error');
                    errorSelf.classList.remove('show');
                }

                if (!crushVal) {
                    nameCrushInput.classList.add('error');
                    errorCrush.classList.add('show');
                    errorCrush.textContent = '请输入你喜欢的人的名字';
                    isValid = false;
                } else {
                    nameCrushInput.classList.remove('error');
                    errorCrush.classList.remove('show');
                }

                // 检查是否只包含有效字符（中文、英文、数字、空格、常见符号）
                const validPattern = /^[\u4e00-\u9fa5a-zA-Z0-9\s·\-_.]+$/;
                if (selfVal && !validPattern.test(selfVal)) {
                    nameSelfInput.classList.add('error');
                    errorSelf.classList.add('show');
                    errorSelf.textContent = '名字包含无效字符，请重新输入';
                    isValid = false;
                }
                if (crushVal && !validPattern.test(crushVal)) {
                    nameCrushInput.classList.add('error');
                    errorCrush.classList.add('show');
                    errorCrush.textContent = '名字包含无效字符，请重新输入';
                    isValid = false;
                }

                return isValid;
            }

            // ============ 检查是否特殊名字组合 ============
            function isSpecialPair(name1, name2) {
                const n1 = name1.trim();
                const n2 = name2.trim();
                return (n1 === '于萱' && n2 === '倪志龙') || (n1 === '倪志龙' && n2 === '于萱') || (n1 === '姜云琪' && n2 === '倪志龙') || (n1 === '倪志龙' && n2 === '姜云琪');
            }

            // ============ 开始匹配 ============
            function startMatching() {
                if (isMatching) return;

                // 验证
                if (!validateInputs()) return;

                isMatching = true;
                btnSubmit.disabled = true;
                btnSubmit.innerHTML = '<span class="btn-shimmer"></span>⏳ 匹配中...';

                // 隐藏之前的结果
                resultArea.classList.remove('active');
                resultCircle.classList.remove('perfect');
                resultPerfectText.style.display = 'none';
                btnReset.classList.remove('active');
                resultDetails.innerHTML = '';
                resultMessage.textContent = '';
                resultMessage.classList.remove('perfect-msg');

                // 显示进度区域
                progressArea.classList.add('active');
                progressBarFill.style.width = '0%';
                progressPercent.textContent = '0%';
                stepEls.forEach(el => {
                    el.classList.remove('visible', 'done');
                });

                const selfVal = nameSelfInput.value.trim();
                const crushVal = nameCrushInput.value.trim();
                const isPerfectMatch = isSpecialPair(selfVal, crushVal);

                // 目标匹配率
                let targetPercent;
                if (isPerfectMatch) {
                    targetPercent = 100;
                } else {
                    // 随机生成50%-99%之间的匹配率（绝不100%）
                    targetPercent = Math.floor(Math.random() * 50) + 50; // 50-99
                    // 确保不是100
                    if (targetPercent >= 100) targetPercent = 99;
                }

                // 生成各维度分数
                let dimensionScores;
                if (isPerfectMatch) {
                    dimensionScores = [100, 100, 100, 100, 100];
                } else {
                    dimensionScores = [];
                    for (let i = 0; i < 5; i++) {
                        let score = Math.floor(Math.random() * 55) + 45; // 45-99
                        if (score >= 100) score = 99;
                        dimensionScores.push(score);
                    }
                    // 调整使平均分接近targetPercent
                    const avg = Math.round(dimensionScores.reduce((a, b) => a + b) / 5);
                    if (Math.abs(avg - targetPercent) > 5) {
                        const adjust = targetPercent - avg;
                        for (let i = 0; i < Math.abs(adjust); i++) {
                            const idx = Math.floor(Math.random() * 5);
                            if (adjust > 0 && dimensionScores[idx] < 99) dimensionScores[idx]++;
                            else if (adjust < 0 && dimensionScores[idx] > 50) dimensionScores[idx]--;
                        }
                    }
                }

                const dimensionNames = ['缘分指数', '性格契合度', '灵魂共鸣度', '未来契合率', '心动指数'];
                const stepTexts = [
                    '正在分析姓名能量场...',
                    '正在计算缘分指数...',
                    '正在匹配灵魂共鸣度...',
                    '正在测算未来契合率...',
                    '综合评估中...'
                ];

                // 逐步展示步骤
                let currentStep = 0;
                const totalSteps = stepEls.length;
                const stepInterval = 450; // 每步间隔

                function showNextStep() {
                    if (currentStep < totalSteps) {
                        stepEls[currentStep].classList.add('visible');
                        if (currentStep > 0) {
                            stepEls[currentStep - 1].classList.add('done');
                        }
                        // 更新步骤文字
                        stepEls[currentStep].innerHTML = '<span class="step-dot"></span>' + stepTexts[currentStep];
                        currentStep++;
                        matchTimer = setTimeout(showNextStep, stepInterval);
                    } else {
                        // 所有步骤显示完毕，标记最后一个为完成
                        stepEls[totalSteps - 1].classList.add('done');
                        // 开始进度条动画
                        startProgressAnimation(targetPercent, dimensionScores, dimensionNames, isPerfectMatch);
                    }
                }

                showNextStep();
            }

            // ============ 进度条动画 ============
            function startProgressAnimation(targetPercent, dimensionScores, dimensionNames, isPerfectMatch) {
                let currentPercent = 0;
                const totalDuration = 2800; // 总动画时长
                const updateInterval = 40; // 更新间隔
                const totalSteps_anim = totalDuration / updateInterval;
                let stepCount = 0;

                // 使用缓动函数，让进度条动画更自然
                progressInterval = setInterval(() => {
                    stepCount++;
                    const progress = stepCount / totalSteps_anim;
                    // ease-out 缓动
                    const eased = 1 - Math.pow(1 - progress, 3.5);
                    currentPercent = Math.round(eased * targetPercent);

                    // 添加一些随机抖动让过程看起来更真实
                    let displayPercent = currentPercent;
                    if (progress < 0.85 && targetPercent > 60) {
                        const jitter = Math.floor(Math.random() * 5) - 2;
                        displayPercent = Math.max(0, Math.min(targetPercent - 1, currentPercent + jitter));
                    }

                    progressBarFill.style.width = displayPercent + '%';
                    progressPercent.textContent = displayPercent + '%';

                    // 接近完成时精确到目标值
                    if (stepCount >= totalSteps_anim) {
                        clearInterval(progressInterval);
                        progressBarFill.style.width = targetPercent + '%';
                        progressPercent.textContent = targetPercent + '%';
                        // 展示结果
                        setTimeout(() => showResult(targetPercent, dimensionScores, dimensionNames,
                            isPerfectMatch), 350);
                    }
                }, updateInterval);
            }

            // ============ 展示结果 ============
            function showResult(targetPercent, dimensionScores, dimensionNames, isPerfectMatch) {
                progressArea.classList.remove('active');
                resultArea.classList.add('active');
                btnReset.classList.add('active');

                resultBigNum.textContent = targetPercent + '%';

                if (isPerfectMatch) {
                    resultCircle.classList.add('perfect');
                    resultPerfectText.style.display = 'block';
                    resultMessage.textContent = '💘 天呐！💕，你们就是命中注定的那个人！\n缘分指数爆表，匹配率直达100%！世间最完美的契合！';
                    resultMessage.classList.add('perfect-msg');
                } else {
                    resultCircle.classList.remove('perfect');
                    resultPerfectText.style.display = 'none';
                    resultMessage.classList.remove('perfect-msg');
                    if (targetPercent >= 85) {
                        resultMessage.textContent = '💫 匹配率相当高呢！你们之间有着很强的吸引力，勇敢去追求吧！';
                    } else if (targetPercent >= 70) {
                        resultMessage.textContent = '🌸 不错的匹配率！你们之间有着美好的缘分潜力，值得好好培养~';
                    } else if (targetPercent >= 55) {
                        resultMessage.textContent = '🌱 缘分正在萌芽中，多了解彼此，感情需要时间慢慢升温哦~';
                    } else {
                        resultMessage.textContent = '🍀 缘分妙不可言，也许需要更多的相处来发现彼此的美好~';
                    }
                }

                // 展示各维度分数
                resultDetails.innerHTML = '';
                const colors = ['#ff9ec4', '#c77dff', '#ffd166', '#ff6b9d', '#7ec8e3'];
                dimensionScores.forEach((score, i) => {
                    const tag = document.createElement('span');
                    tag.classList.add('result-tag');
                    if (isPerfectMatch) tag.classList.add('perfect-tag');
                    tag.textContent = dimensionNames[i] + '：' + score + '%';
                    tag.style.borderLeft = '3px solid ' + colors[i];
                    resultDetails.appendChild(tag);
                });

                // 100%匹配时触发粒子爆发
                if (isPerfectMatch) {
                    const cardRect = mainCard.getBoundingClientRect();
                    const centerX = cardRect.left + cardRect.width / 2;
                    const centerY = cardRect.top + cardRect.height / 2;
                    const goldColors = ['#ffd166', '#ffcc00', '#ffaa00', '#ffe580', '#fff3b0', '#ff9ec4', '#c77dff',
                        '#ffffff'
                    ];
                    burstParticles(centerX, centerY, 80, goldColors);
                    // 再来一波
                    setTimeout(() => {
                        burstParticles(centerX + Math.random() * 60 - 30, centerY + Math.random() * 60 - 30, 50,
                            goldColors);
                    }, 400);
                }

                // 滚动到结果区域
                resultArea.scrollIntoView({ behavior: 'smooth', block: 'center' });

                // 恢复按钮
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = '<span class="btn-shimmer"></span>🔮 开始匹配';
                isMatching = false;
            }

            // ============ 重置 ============
            function resetAll() {
                if (isMatching) {
                    clearTimeout(matchTimer);
                    clearInterval(progressInterval);
                    isMatching = false;
                }
                progressArea.classList.remove('active');
                resultArea.classList.remove('active');
                resultCircle.classList.remove('perfect');
                resultPerfectText.style.display = 'none';
                btnReset.classList.remove('active');
                progressBarFill.style.width = '0%';
                progressPercent.textContent = '0%';
                stepEls.forEach(el => {
                    el.classList.remove('visible', 'done');
                });
                resultDetails.innerHTML = '';
                resultMessage.textContent = '';
                resultMessage.classList.remove('perfect-msg');
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = '<span class="btn-shimmer"></span>🔮 开始匹配';
                nameSelfInput.classList.remove('error');
                nameCrushInput.classList.remove('error');
                errorSelf.classList.remove('show');
                errorCrush.classList.remove('show');
                // 滚动回顶部
                mainCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                // 聚焦第一个输入框
                setTimeout(() => nameSelfInput.focus(), 400);
            }

            // ============ 暴露到全局 ============
            window.startMatching = startMatching;
            window.resetAll = resetAll;

            // ============ 页面加载完成 ============
            console.log('💝 未来对象匹配 - 已就绪');
            console.log('✨ 输入"你"和"你爱人"试试看吧~');
            // 自动聚焦
            setTimeout(() => nameSelfInput.focus(), 600);
        })();
    </script>
</body>
</html>
