<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>To My Love</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{background:#0a0a0f}
body{
    background:#0a0a0f;
    overflow:hidden;height:100vh;width:100vw;
    font-family:'Playfair Display','Noto Serif SC',serif;color:#f5e6e8;
    -webkit-user-select:none;user-select:none
}
.loading{
    position:fixed;inset:0;z-index:100;
    background:#0a0a0f;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;
    transition:opacity 1s ease,visibility 1s ease
}
.loading.hidden{opacity:0;visibility:hidden}
.loading-ring{width:60px;height:60px;border:1px solid rgba(245,230,232,0.1);border-top-color:#e8a0b4;border-radius:50%;animation:spin 1.2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'Playfair Display',serif;font-style:italic;font-size:16px;letter-spacing:6px;color:rgba(245,230,232,0.5);animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:1}}
.container{position:relative;width:100vw;height:100vh;overflow:hidden}
.site-title{
    position:absolute;top:36px;left:50%;transform:translateX(-50%);z-index:15;
    font-size:13px;letter-spacing:10px;text-transform:uppercase;color:rgba(245,230,232,0.35);
    pointer-events:none
}
.slide-counter{
    position:absolute;top:36px;right:40px;z-index:15;
    font-size:12px;letter-spacing:3px;color:rgba(245,230,232,0.35);font-feature-settings:"tnum";
    pointer-events:none;font-family:'Playfair Display',serif
}
.slider-wrapper{width:100%;height:100%;overflow:hidden}
.slider{
    display:flex;width:100%;height:100%;
    transition:transform 0.9s cubic-bezier(0.22,0.1,0.15,1);
    will-change:transform
}
.slide{
    flex:0 0 100%;height:100%;position:relative;overflow:hidden
}
.slide img{
    width:100%;height:100%;object-fit:cover;display:block;
    transform:scale(1.03);transition:transform 8s ease-out
}
.slide.active img{transform:scale(1)}
.slide .overlay{
    position:absolute;inset:0;
    background:linear-gradient(to bottom,rgba(10,10,15,0.5) 0%,transparent 25%,transparent 70%,rgba(10,10,15,0.55) 100%);
    pointer-events:none;z-index:2
}
.slide .vignette{
    position:absolute;inset:0;z-index:3;pointer-events:none;
    box-shadow:inset 0 0 180px rgba(10,10,15,0.45)
}
.slide .warm-glow{
    position:absolute;inset:0;z-index:4;pointer-events:none;
    background:radial-gradient(ellipse at center,transparent 50%,rgba(232,160,180,0.04) 100%);
    mix-blend-mode:screen
}
.slide .fallback{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#1a0f14,#0d0d1a);z-index:1
}
.slide .fallback span{
    font-family:'Playfair Display',serif;font-style:italic;
    font-size:14px;letter-spacing:6px;color:rgba(245,230,232,0.25)
}
#rippleCanvas{
    position:absolute;top:0;left:0;width:100%;height:100%;
    pointer-events:none;z-index:10;opacity:0.85;
    mix-blend-mode:overlay;-webkit-mix-blend-mode:overlay;isolation:isolate
}
#particlesCanvas{
    position:absolute;top:0;left:0;width:100%;height:100%;
    pointer-events:none;z-index:6
}
.nav-dots{
    position:absolute;bottom:36px;left:50%;transform:translateX(-50%);
    display:flex;gap:14px;z-index:20
}
.nav-dot{
    width:8px;height:8px;border-radius:50%;
    background:rgba(245,230,232,0.2);
    border:1px solid rgba(245,230,232,0.12);
    cursor:pointer;transition:all 0.5s ease;position:relative
}
.nav-dot.active{
    background:#e8a0b4;border-color:#e8a0b4;
    box-shadow:0 0 24px rgba(232,160,180,0.4);
    transform:scale(1.25)
}
.nav-dot:hover{background:rgba(245,230,232,0.5)}
.nav-dot.active:hover{background:#e8a0b4}
.progress-bar{
    position:absolute;bottom:0;left:0;height:2px;z-index:20;
    background:linear-gradient(90deg,#e8a0b4,transparent);
    width:0;transition:width 0.1s linear;
    pointer-events:none
}
.nav-arrow{
    position:absolute;top:50%;transform:translateY(-50%);z-index:20;
    width:52px;height:52px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;opacity:0;
    transition:all 0.5s ease;
    background:rgba(245,230,232,0.04);border-radius:50%;
    border:1px solid rgba(245,230,232,0.06);backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px)
}
.container:hover .nav-arrow{opacity:0.6}
.nav-arrow:hover{opacity:1!important;background:rgba(245,230,232,0.1);border-color:rgba(232,160,180,0.2)}
.nav-arrow.prev{left:28px}
.nav-arrow.next{right:28px}
.nav-arrow svg{width:22px;height:22px;fill:none;stroke:#f5e6e8;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.nav-arrow.prev svg{transform:translateX(-1px)}
.nav-arrow.next svg{transform:translateX(1px)}
.romantic-text{
    position:absolute;bottom:82px;left:50%;transform:translateX(-50%);z-index:15;
    text-align:center;font-family:'Playfair Display',serif;
    font-style:italic;font-size:15px;letter-spacing:4px;
    color:rgba(245,230,232,0.45);pointer-events:none;
    opacity:0;transition:opacity 1.2s ease
}
.romantic-text.show{opacity:1}
.romantic-text .heart{color:#e8a0b4;font-style:normal;display:inline-block;animation:heartbeat 2s ease-in-out infinite}
@keyframes heartbeat{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@media(max-width:768px){
    .site-title{top:24px;font-size:11px;letter-spacing:6px}
    .slide-counter{top:24px;right:20px;font-size:11px}
    .nav-arrow{width:40px;height:40px;opacity:0.5}
    .nav-arrow.prev{left:14px}
    .nav-arrow.next{right:14px}
    .nav-arrow svg{width:18px;height:18px}
    .nav-dots{bottom:28px;gap:10px}
    .nav-dot{width:7px;height:7px}
    .romantic-text{bottom:62px;font-size:13px;letter-spacing:3px}
}
@media(max-width:480px){
    .site-title{top:20px;font-size:10px;letter-spacing:5px}
    .slide-counter{top:20px;right:16px;font-size:10px}
    .romantic-text{bottom:56px;font-size:12px;letter-spacing:2px;max-width:90vw}
}
</style>
</head>
<body>
<div class="loading" id="loading">
    <div class="loading-ring"></div>
    <div class="loading-text">Loading memories...</div>
</div>
<div class="container" id="container">
    <div class="site-title">For You</div>
    <div class="slide-counter" id="slideCounter">01 / 05</div>
    <div class="slider-wrapper">
        <div class="slider" id="slider"></div>
    </div>
    <canvas id="particlesCanvas"></canvas>
    <canvas id="rippleCanvas"></canvas>
    <div class="romantic-text" id="romanticText">
        <span class="heart">&#9829;</span>  every moment with you  <span class="heart">&#9829;</span>
    </div>
    <div class="nav-dots" id="navDots"></div>
    <div class="progress-bar" id="progressBar"></div>
    <div class="nav-arrow prev" id="prevArrow">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <div class="nav-arrow next" id="nextArrow">
        <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
    </div>
</div>
<script>
(function(){
'use strict';
var IMAGES = [
    'https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&w=1600&q=80',
    'https://images.unsplash.com/photo-1522673607200-164d1b6ce486?auto=format&fit=crop&w=1600&q=80',
    'https://images.unsplash.com/photo-1474552226712-ac0f0961a954?auto=format&fit=crop&w=1600&q=80',
    'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80',
    'https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?auto=format&fit=crop&w=1600&q=80'
];
var ROMANTIC_LINES = [
    'every moment with you',
    'you are my everything',
    'endless love',
    'you make my world beautiful',
    'forever and always'
];
var AUTO_PLAY_INTERVAL = 5000;
var TRANSITION_DURATION = 900;
var touchThreshold = 50;
var currentIndex = 0;
var isTransitioning = false;
var autoPlayTimer = null;
var slider = document.getElementById('slider');
var navDots = document.getElementById('navDots');
var slideCounter = document.getElementById('slideCounter');
var romanticText = document.getElementById('romanticText');
var progressBar = document.getElementById('progressBar');
var loading = document.getElementById('loading');
var prevArrow = document.getElementById('prevArrow');
var nextArrow = document.getElementById('nextArrow');
var container = document.getElementById('container');

function buildSlides() {
    slider.innerHTML = '';
    navDots.innerHTML = '';
    IMAGES.forEach(function(url, i) {
        var slide = document.createElement('div');
        slide.className = 'slide' + (i === 0 ? ' active' : '');
        var img = document.createElement('img');
        img.alt = '';
        img.loading = i === 0 ? 'eager' : 'lazy';
        var fallback = document.createElement('div');
        fallback.className = 'fallback';
        fallback.innerHTML = '<span>' + (i + 1) + '</span>';
        slide.appendChild(fallback);
        var loadImg = new Image();
        loadImg.onload = function() {
            if (img.src === url) return;
            img.src = url;
            fallback.remove();
        };
        loadImg.onerror = function() {
            fallback.innerHTML = '<span>&#10022;</span>';
        };
        loadImg.src = url;
        slide.appendChild(img);
        var overlay = document.createElement('div');
        overlay.className = 'overlay';
        slide.appendChild(overlay);
        var vignette = document.createElement('div');
        vignette.className = 'vignette';
        slide.appendChild(vignette);
        var warmGlow = document.createElement('div');
        warmGlow.className = 'warm-glow';
        slide.appendChild(warmGlow);
        slider.appendChild(slide);
        var dot = document.createElement('div');
        dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
        dot.dataset.index = i;
        navDots.appendChild(dot);
    });
    updateCounter();
}

function goToSlide(index, userInitiated) {
    if (isTransitioning) return;
    if (index < 0 || index >= IMAGES.length) return;
    isTransitioning = true;
    currentIndex = index;
    slider.style.transform = 'translateX(-' + (index * 100) + '%)';
    var slides = document.querySelectorAll('.slide');
    for (var si = 0; si < slides.length; si++) {
        slides[si].classList.toggle('active', si === index);
    }
    var dots = document.querySelectorAll('.nav-dot');
    for (var di = 0; di < dots.length; di++) {
        dots[di].classList.toggle('active', di === index);
    }
    romanticText.textContent = ROMANTIC_LINES[index] || ROMANTIC_LINES[0];
    romanticText.classList.remove('show');
    setTimeout(function() { romanticText.classList.add('show'); }, 400);
    updateCounter();
    setTimeout(function() { isTransitioning = false; }, TRANSITION_DURATION);
    if (userInitiated) resetAutoPlay();
}

function updateCounter() {
    var num = (currentIndex + 1).toString().padStart(2, '0');
    var total = IMAGES.length.toString().padStart(2, '0');
    slideCounter.textContent = num + ' / ' + total;
}

function nextSlide() { goToSlide((currentIndex + 1) % IMAGES.length, true); }
function prevSlide() { goToSlide((currentIndex - 1 + IMAGES.length) % IMAGES.length, true); }

function resetAutoPlay() { stopAutoPlay(); startAutoPlay(); }

function startAutoPlay() {
    if (autoPlayTimer) return;
    progressBar.style.transition = 'none';
    progressBar.style.width = '0';
    void progressBar.offsetWidth;
    progressBar.style.transition = 'width ' + AUTO_PLAY_INTERVAL + 'ms linear';
    progressBar.style.width = '100%';
    autoPlayTimer = setTimeout(function() { nextSlide(); }, AUTO_PLAY_INTERVAL);
}

function stopAutoPlay() {
    if (autoPlayTimer) { clearTimeout(autoPlayTimer); autoPlayTimer = null; }
    progressBar.style.transition = 'none';
    progressBar.style.width = '0';
}

// Water ripple effect
(function() {
    var canvas = document.getElementById('rippleCanvas');
    var ctx = canvas.getContext('2d');
    var cols, rows, cellW, cellH;
    var buf1, buf2, currentBuf;
    var DAMPING = 0.985;
    var animId = null;

    function resize() {
        var w = canvas.parentElement.clientWidth;
        var h = canvas.parentElement.clientHeight;
        var dpr = window.devicePixelRatio || 1;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        cellW = 10; cellH = 10;
        cols = Math.ceil(canvas.width / cellW);
        rows = Math.ceil(canvas.height / cellH);
        buf1 = new Float32Array(cols * rows);
        buf2 = new Float32Array(cols * rows);
        currentBuf = buf1;
        ctx.scale(dpr, dpr);
    }

    function disturb(cx, cy, radius, strength) {
        var col = Math.round(cx / cellW);
        var row = Math.round(cy / cellH);
        var r = Math.round(radius / cellW);
        for (var dy = -r; dy <= r; dy++) {
            for (var dx = -r; dx <= r; dx++) {
                var c = col + dx;
                var rr = row + dy;
                if (c >= 0 && c < cols && rr >= 0 && rr < rows) {
                    var dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist <= r) {
                        var val = strength * Math.cos(dist / r * Math.PI * 0.8) * (1 - dist / r);
                        currentBuf[rr * cols + c] += val;
                    }
                }
            }
        }
    }

    function simulate() {
        var bufA = currentBuf;
        var bufB = (currentBuf === buf1) ? buf2 : buf1;
        for (var y = 1; y < rows - 1; y++) {
            var rowOff = y * cols;
            for (var x = 1; x < cols - 1; x++) {
                var idx = rowOff + x;
                bufB[idx] = (bufA[idx - 1] + bufA[idx + 1] + bufA[idx - cols] + bufA[idx + cols]) * 0.5 - bufB[idx];
                bufB[idx] *= DAMPING;
            }
        }
        currentBuf = bufB;
    }

    function render() {
        var dpr = window.devicePixelRatio || 1;
        var w = canvas.width;
        var h = canvas.height;
        var tempCanvas = document.createElement('canvas');
        tempCanvas.width = cols;
        tempCanvas.height = rows;
        var tempCtx = tempCanvas.getContext('2d');
        var imageData = tempCtx.createImageData(cols, rows);
        var data = imageData.data;
        var buf = currentBuf;
        for (var i = 0; i < cols * rows; i++) {
            var idx4 = i * 4;
            var val = buf[i];
            if (Math.abs(val) > 0.8) {
                var intensity = Math.min(Math.abs(val) / 25, 1);
                if (val > 0) {
                    data[idx4] = 255; data[idx4+1] = 240; data[idx4+2] = 242;
                    data[idx4+3] = Math.floor(intensity * 50);
                } else {
                    data[idx4] = 0; data[idx4+1] = 0; data[idx4+2] = 0;
                    data[idx4+3] = Math.floor(intensity * 35);
                }
            } else {
                data[idx4] = 128; data[idx4+1] = 128; data[idx4+2] = 128;
                data[idx4+3] = 0;
            }
        }
        tempCtx.putImageData(imageData, 0, 0);
        ctx.clearRect(0, 0, w / dpr, h / dpr);
        ctx.imageSmoothingEnabled = true;
        ctx.drawImage(tempCanvas, 0, 0, w / dpr, h / dpr);
    }

    function tick() {
        simulate();
        render();
        animId = requestAnimationFrame(tick);
    }

    function onInteraction(e) {
        var rect = canvas.getBoundingClientRect();
        var x, y;
        if (e.touches) { x = e.touches[0].clientX - rect.left; y = e.touches[0].clientY - rect.top; }
        else { x = e.clientX - rect.left; y = e.clientY - rect.top; }
        disturb(x, y, 40, 120);
    }

    function onMouseMove(e) {
        var rect = canvas.getBoundingClientRect();
        disturb(e.clientX - rect.left, e.clientY - rect.top, 25, 30);
    }

    window.addEventListener('resize', function() { resize(); });
    resize();
    canvas.parentElement.addEventListener('click', onInteraction);
    canvas.parentElement.addEventListener('touchstart', onInteraction, { passive: true });
    container.addEventListener('mousemove', function(e) {
        if (container._rt) return;
        container._rt = true;
        setTimeout(function() { container._rt = false; }, 40);
        onMouseMove(e);
    });
    tick();
})();

// Particle system
(function() {
    var canvas = document.getElementById('particlesCanvas');
    var ctx = canvas.getContext('2d');
    var particles = [];
    var COUNT = 35;
    var w, h;

    function resize() {
        w = canvas.parentElement.clientWidth;
        h = canvas.parentElement.clientHeight;
        var dpr = window.devicePixelRatio || 1;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.scale(dpr, dpr);
    }

    function createParticle() {
        return {
            x: Math.random() * w, y: Math.random() * h,
            size: 1 + Math.random() * 2.5,
            sx: (Math.random() - 0.5) * 0.15,
            sy: -(0.08 + Math.random() * 0.25),
            op: 0.1 + Math.random() * 0.3,
            ps: 0.005 + Math.random() * 0.015,
            pp: Math.random() * Math.PI * 2
        };
    }

    function init() {
        particles = [];
        for (var i = 0; i < COUNT; i++) particles.push(createParticle());
    }

    function update() {
        for (var i = 0; i < particles.length; i++) {
            var p = particles[i];
            p.x += p.sx; p.y += p.sy; p.pp += p.ps;
            if (p.y < -10) { p.y = h + 10; p.x = Math.random() * w; }
            if (p.x < -10) p.x = w + 10;
            if (p.x > w + 10) p.x = -10;
        }
    }

    function render() {
        ctx.clearRect(0, 0, w, h);
        for (var i = 0; i < particles.length; i++) {
            var p = particles[i];
            var pulse = 0.5 + 0.5 * Math.sin(p.pp);
            var alpha = p.op * pulse;
            var g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 6);
            g.addColorStop(0, 'rgba(232,160,180,' + (alpha * 0.6) + ')');
            g.addColorStop(0.3, 'rgba(232,160,180,' + (alpha * 0.2) + ')');
            g.addColorStop(1, 'rgba(232,160,180,0)');
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 6, 0, Math.PI * 2);
            ctx.fillStyle = g; ctx.fill();
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 0.5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(245,230,232,' + (alpha * 0.7) + ')';
            ctx.fill();
        }
    }

    function tick() { update(); render(); requestAnimationFrame(tick); }
    window.addEventListener('resize', function() { resize(); init(); });
    resize(); init(); tick();
})();

// Touch support
(function() {
    var sx = 0, sy = 0, sw = false;
    container.addEventListener('touchstart', function(e) {
        sx = e.touches[0].clientX; sy = e.touches[0].clientY; sw = true;
    }, { passive: true });
    container.addEventListener('touchmove', function(e) {
        if (!sw) return;
        if (Math.abs(e.touches[0].clientX - sx) > 10) e.preventDefault();
    }, { passive: false });
    container.addEventListener('touchend', function(e) {
        if (!sw) return; sw = false;
        var dx = e.changedTouches[0].clientX - sx;
        var dy = e.changedTouches[0].clientY - sy;
        if (Math.abs(dx) > touchThreshold && Math.abs(dx) > Math.abs(dy) * 1.5) {
            if (dx > 0) prevSlide(); else nextSlide();
        }
    }, { passive: true });
})();

// Keyboard
document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight') { e.preventDefault(); nextSlide(); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
    if (e.key === ' ') { e.preventDefault(); nextSlide(); }
});

// Dot clicks
navDots.addEventListener('click', function(e) {
    var dot = e.target.closest('.nav-dot');
    if (dot) { var idx = parseInt(dot.dataset.index); if (!isNaN(idx)) goToSlide(idx, true); }
});

// Arrow clicks
prevArrow.addEventListener('click', prevSlide);
nextArrow.addEventListener('click', nextSlide);

// Resize handling
var rt;
window.addEventListener('resize', function() {
    slider.style.transition = 'none';
    clearTimeout(rt);
    rt = setTimeout(function() {
        slider.style.transition = '';
        slider.style.transform = 'translateX(-' + (currentIndex * 100) + '%)';
    }, 200);
});

// Init
buildSlides();
setTimeout(function() { romanticText.classList.add('show'); }, 600);
setTimeout(function() { startAutoPlay(); }, 800);

var loadedCount = 0;
function onImageLoad() {
    loadedCount++;
    if (loadedCount >= Math.min(IMAGES.length, 3)) loading.classList.add('hidden');
}
for (var pi = 0; pi < Math.min(IMAGES.length, 3); pi++) {
    var pimg = new Image();
    pimg.onload = onImageLoad;
    pimg.onerror = onImageLoad;
    pimg.src = IMAGES[pi];
}
setTimeout(function() { loading.classList.add('hidden'); }, 4000);

})();
</script>
</body>
</html>
